<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Upload Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Audio Upload Player</h1>
    <p class="desc">Choose a local audio file and play it directly in the browser.</p>

    <label class="upload-box" for="audioInput">
      <div class="upload-icon">🎵</div>
      <div class="upload-text">Click to upload audio</div>
      <div class="upload-hint">Supports MP3, WAV, OGG, M4A</div>
    </label>

    <input id="audioInput" type="file" accept="audio/*" />

    <div id="fileInfo" class="file-info"></div>

    <audio id="audioPlayer" controls></audio>

    <div id="status" class="status">No audio file selected</div>

    <section class="filter-section">
      <h2>FILTER</h2>

      <div class="filter-grid">
        <div class="filter-card">
          <h3>low-pass</h3>
          <label>
            Frequency
            <input id="lowPassFreq" type="range" min="50" max="12000" value="1000">
            <span id="lowPassValue">1000 Hz</span>
          </label>
          <button id="lowPassBtn">Apply</button>
        </div>

        <div class="filter-card">
          <h3>high-pass</h3>
          <label>
            Frequency
            <input id="highPassFreq" type="range" min="20" max="8000" value="800">
            <span id="highPassValue">800 Hz</span>
          </label>
          <button id="highPassBtn">Apply</button>
        </div>

        <div class="filter-card">
          <h3>band-pass</h3>
          <label>
            Frequency
            <input id="bandPassFreq" type="range" min="50" max="12000" value="1500">
            <span id="bandPassValue">1500 Hz</span>
          </label>
          <label>
            Q
            <input id="bandPassQ" type="range" min="1" max="30" value="5">
            <span id="bandPassQValue">5</span>
          </label>
          <button id="bandPassBtn">Apply</button>
        </div>

        <div class="filter-card">
          <h3>Notch</h3>
          <label>
            Frequency
            <input id="notchFreq" type="range" min="50" max="12000" value="1000">
            <span id="notchValue">1000 Hz</span>
          </label>
          <label>
            Q
            <input id="notchQ" type="range" min="0.1" max="30" step="0.1" value="0.1">
            <span id="notchQValue">0.1</span>
          </label>
          <button id="notchBtn">Apply</button>
        </div>
      </div>
    </section>

    <div class="visualisation">
        <h2>VISUALISATION</h2>

        <div class="visual-grid">
            <div class="visual-card">
            <p>Waveform</p>
            <canvas id="waveCanvas"></canvas>
            </div>

            <div class="visual-card">
            <p>Spectrum</p>
            <canvas id="spectrumCanvas"></canvas>
            </div>
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
